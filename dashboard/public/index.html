<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Awaterra World</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg-mesh"></div>
  <div class="bg-noise"></div>

  <!-- Login screen -->
  <div id="login-screen" style="display:none">
    <div class="login-card">
      <div class="empty-orb" style="width:60px;height:60px;margin-bottom:12px"></div>
      <h2>Awaterra <span class="logo-thin">World</span></h2>
      <div class="login-fields">
        <input type="text" id="login-user" placeholder="Username" autocomplete="username">
        <input type="password" id="login-pass" placeholder="Password" autocomplete="current-password">
      </div>
      <p id="login-error" class="login-error"></p>
      <button id="login-btn" class="btn btn-primary" style="width:100%;justify-content:center;padding:10px">Sign in</button>
    </div>
  </div>

  <header>
    <div class="header-left">
      <div class="logo">
        <span class="logo-glyph">&#9672;</span>
        <h1>Awaterra <span class="logo-thin">World</span></h1>
      </div>
      <nav class="view-switcher">
        <button class="active" data-view="tree">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v18M5 8l7-5 7 5M3 18h18"/></svg>
          Tree
        </button>
        <button data-view="graph">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="5" cy="6" r="3"/><circle cx="19" cy="6" r="3"/><circle cx="12" cy="18" r="3"/><line x1="7.5" y1="7.5" x2="10.5" y2="16.5"/><line x1="16.5" y1="7.5" x2="13.5" y2="16.5"/></svg>
          Graph
        </button>
      </nav>
    </div>
    <div class="stats" id="stats"></div>
  </header>

  <main>
    <aside id="sidebar">
      <div class="search-box">
        <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search" placeholder="Search... (Ctrl+K)">
      </div>
      <div id="tag-panel" class="tag-panel collapsed">
        <div class="tag-panel-header">
          <span class="tag-panel-label">Tags</span>
          <span class="tag-panel-count"></span>
          <span class="tag-panel-arrow"></span>
        </div>
        <div class="tag-panel-body"></div>
      </div>
      <div id="tree"></div>
      <button id="new-file-btn" class="btn-new">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New file
      </button>
    </aside>

    <canvas id="graph-canvas" style="display:none"></canvas>
    <section id="content">
      <div id="empty-state">
        <div class="empty-orb"></div>
        <p class="empty-title">Awaterra World</p>
        <p class="empty-sub">Select a file from the tree to begin exploring</p>
      </div>
      <div id="file-view" style="display:none">
        <div id="metadata"></div>
        <div class="toolbar">
          <button id="btn-edit" class="btn btn-ghost">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            Edit
          </button>
          <button id="btn-preview" class="btn btn-ghost" style="display:none">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            Preview
          </button>
          <button id="btn-delete" class="btn btn-ghost btn-danger">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            Delete
          </button>
        </div>
        <div id="preview"></div>
        <div id="editor" style="display:none">
          <textarea id="editor-body"></textarea>
        </div>
        <div id="actions" style="display:none">
          <button id="btn-save" class="btn btn-primary">Save</button>
          <button id="btn-cancel" class="btn btn-ghost">Cancel</button>
        </div>
      </div>
    </section>
  </main>

  <!-- New file modal -->
  <div id="modal-overlay" style="display:none">
    <div id="modal">
      <h3>New File</h3>
      <label>
        <span class="label-text">ID (latin, hyphens)</span>
        <input type="text" id="new-id" placeholder="my-concept">
      </label>
      <label>
        <span class="label-text">Title</span>
        <input type="text" id="new-title" placeholder="My Concept">
      </label>
      <label>
        <span class="label-text">Type</span>
        <select id="new-type">
          <option value="concept">concept</option>
          <option value="scene">scene</option>
          <option value="meta">meta</option>
        </select>
      </label>
      <label>
        <span class="label-text">Domain</span>
        <select id="new-domain">
          <option value="technology">technology</option>
          <option value="daily-life">daily-life</option>
          <option value="society">society</option>
          <option value="substances">substances</option>
          <option value="nature">nature</option>
          <option value="culture">culture</option>
          <option value="spaces">spaces</option>
        </select>
      </label>
      <div class="modal-actions">
        <button id="modal-create" class="btn btn-primary">Create</button>
        <button id="modal-cancel" class="btn btn-ghost">Cancel</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
